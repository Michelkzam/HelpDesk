<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contratos - Helpdesk & RMM</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .contratos-container {
      padding: 32px;
    }

    .header-contratos {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .btn-novo {
      background: var(--topbar);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .filtros {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filtro {
      padding: 8px 16px;
      background: #f7fafc;
      border: 1px solid #d8e2ed;
      border-radius: 6px;
      cursor: pointer;
    }

    .filtro.ativo {
      background: var(--topbar);
      color: white;
    }

    .tabela-contratos {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .tabela-contratos th {
      background: #f7fafc;
      padding: 16px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid #d8e2ed;
    }

    .tabela-contratos td {
      padding: 16px;
      border-bottom: 1px solid #e8eef7;
    }

    .status-vigente {
      display: inline-block;
      padding: 6px 12px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-vencendo {
      display: inline-block;
      padding: 6px 12px;
      background: #fff3e0;
      color: #f57c00;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-vencido {
      display: inline-block;
      padding: 6px 12px;
      background: #ffebee;
      color: #c62828;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .barra-progresso {
      width: 100%;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }

    .barra-fill {
      height: 100%;
      background: var(--topbar);
    }
  </style>
</head>
<body>
  <div class="contratos-container">
    <div class="header-contratos">
      <h1>Contratos</h1>
      <button class="btn-novo" onclick="novoContrato()">+ Novo Contrato</button>
    </div>

    <div class="filtros">
      <button class="filtro ativo" onclick="filtrar(event, 'todos')">Todos</button>
      <button class="filtro" onclick="filtrar(event, 'vigente')">Vigentes</button>
      <button class="filtro" onclick="filtrar(event, 'vencendo')">Vencendo</button>
      <button class="filtro" onclick="filtrar(event, 'vencido')">Vencidos</button>
    </div>

    <table class="tabela-contratos">
      <thead>
        <tr>
          <th>Número</th>
          <th>Cliente</th>
          <th>Tipo</th>
          <th>Valor Mensal</th>
          <th>Início</th>
          <th>Vencimento</th>
          <th>Dias Restantes</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="corpoContratos"></tbody>
    </table>
  </div>

  <script>
    const contratos = [
      {
        id: 'CT-2024-001',
        cliente: 'Tech Solutions',
        tipo: 'RMM + Helpdesk',
        valor: 'R$ 2.500,00',
        inicio: '01/01/2024',
        vencimento: '31/12/2024',
        dias: 225,
        status: 'vigente'
      },
      {
        id: 'CT-2024-002',
        cliente: 'Consultoria Global',
        tipo: 'Suporte Técnico',
        valor: 'R$ 1.500,00',
        inicio: '15/02/2024',
        vencimento: '14/02/2025',
        dias: 258,
        status: 'vigente'
      },
      {
        id: 'CT-2023-015',
        cliente: 'Comércio XYZ',
        tipo: 'RMM + Helpdesk',
        valor: 'R$ 3.200,00',
        inicio: '01/06/2023',
        vencimento: '31/05/2025',
        dias: 375,
        status: 'vigente'
      },
      {
        id: 'CT-2024-008',
        cliente: 'Indústria ABC',
        tipo: 'Consultoria',
        valor: 'R$ 1.000,00',
        inicio: '01/10/2024',
        vencimento: '15/06/2025',
        dias: 26,
        status: 'vencendo'
      },
      {
        id: 'CT-2023-020',
        cliente: 'Empresa Delta',
        tipo: 'Suporte Básico',
        valor: 'R$ 800,00',
        inicio: '01/01/2023',
        vencimento: '31/12/2023',
        dias: -142,
        status: 'vencido'
      }
    ];

    function renderizarContratos() {
      const tbody = document.getElementById('corpoContratos');
      tbody.innerHTML = contratos.map(c => {
        let statusBadge = '';
        if (c.status === 'vigente') {
          statusBadge = '<span class="status-vigente">✓ Vigente</span>';
        } else if (c.status === 'vencendo') {
          statusBadge = '<span class="status-vencendo">⚠ Vencendo</span>';
        } else {
          statusBadge = '<span class="status-vencido">✗ Vencido</span>';
        }

        return `
          <tr>
            <td><strong>${c.id}</strong></td>
            <td>${c.cliente}</td>
            <td>${c.tipo}</td>
            <td>${c.valor}</td>
            <td>${c.inicio}</td>
            <td>${c.vencimento}</td>
            <td>
              <div style="display: flex; align-items: center; gap: 8px;">
                <div class="barra-progresso" style="width: 80px; flex-shrink: 0;">
                  <div class="barra-fill" style="width: ${Math.min(100, (c.dias / 365) * 100)}%;"></div>
                </div>
                ${c.dias > 0 ? c.dias + 'd' : 'VENCIDO'}
              </div>
            </td>
            <td>${statusBadge}</td>
            <td>
              <button onclick="verContrato('${c.id}')" style="background: none; border: none; color: #3f51b5; cursor: pointer; margin-right: 12px;">Ver</button>
              <button onclick="renover('${c.id}')" style="background: none; border: none; color: #4caf50; cursor: pointer;">Renovar</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function filtrar(e, tipo) {
      document.querySelectorAll('.filtro').forEach(f => f.classList.remove('ativo'));
      e.target.classList.add('ativo');
      renderizarContratos();
    }

    function novoContrato() {
      alert('Abrir formulário para novo contrato');
    }

    function verContrato(id) {
      alert('Ver detalhes do contrato: ' + id);
    }

    function renover(id) {
      alert('Renovar contrato: ' + id);
    }

    renderizarContratos();
  </script>
</body>
</html>
