<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automação - Helpdesk & RMM</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .automacao-container {
      padding: 32px;
    }

    .header-automacao {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .btn-novo {
      background: var(--topbar);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .automacoes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .automacao-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-left: 4px solid var(--topbar);
    }

    .automacao-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 16px;
    }

    .automacao-titulo {
      font-weight: 600;
      color: #253858;
      font-size: 1.1rem;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background-color: var(--topbar);
    }

    input:checked + .toggle-slider:before {
      transform: translateX(26px);
    }

    .automacao-descricao {
      color: #6a7c93;
      font-size: 0.95rem;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .automacao-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    .automacao-info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #6a7c93;
    }

    .automacao-info-label {
      font-weight: 600;
      color: #253858;
      min-width: 100px;
    }

    .automacao-acoes {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }

    .btn-acao {
      flex: 1;
      padding: 10px;
      border: 1px solid #d8e2ed;
      background: #f7fafc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-acao:hover {
      background: #eef5ff;
      border-color: var(--topbar);
    }

    .status-ativa {
      display: inline-block;
      padding: 4px 12px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-inativa {
      display: inline-block;
      padding: 4px 12px;
      background: #f5f5f5;
      color: #757575;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="automacao-container">
    <div class="header-automacao">
      <h1>Automações e Fluxos</h1>
      <button class="btn-novo" onclick="criarNovaAutomacao()">+ Nova Automação</button>
    </div>

    <div class="automacoes-grid" id="automacoesList"></div>
  </div>

  <script>
    const automacoes = [
      {
        id: 1,
        titulo: 'Atualizar Patches Automaticamente',
        descricao: 'Aplica patches de segurança automaticamente em todos os servidores',
        gatilho: 'Agenda: Terça-feira às 02:00',
        acao: 'Executar script de atualização',
        ativa: true,
        execucoes: 'Última execução: 18/05/2026 02:15'
      },
      {
        id: 2,
        titulo: 'Backup Automático do Servidor',
        descricao: 'Realiza backup completo do banco de dados diariamente',
        gatilho: 'Agenda: Diariamente às 23:00',
        acao: 'Executar backup completo',
        ativa: true,
        execucoes: 'Última execução: 21/05/2026 23:01'
      },
      {
        id: 3,
        titulo: 'Limpeza de Arquivos Temporários',
        descricao: 'Remove arquivos temporários e logs antigos',
        gatilho: 'Agenda: Sexta-feira às 18:00',
        acao: 'Executar limpeza',
        ativa: true,
        execucoes: 'Última execução: 18/05/2026 18:05'
      },
      {
        id: 4,
        titulo: 'Relatório de Conformidade SLA',
        descricao: 'Gera relatório de conformidade de SLA e envia por email',
        gatilho: 'Agenda: Segunda-feira às 08:00',
        acao: 'Gerar e enviar relatório',
        ativa: false,
        execucoes: 'Última execução: 20/05/2026 08:10'
      },
      {
        id: 5,
        titulo: 'Verificação de Saúde do Sistema',
        descricao: 'Monitora recursos e gera alertas se limites são excedidos',
        gatilho: 'Disparo: A cada 5 minutos',
        acao: 'Verificar e alertar',
        ativa: true,
        execucoes: 'Última execução: 21/05/2026 14:52'
      },
      {
        id: 6,
        titulo: 'Sincronização de Diretório Ativo',
        descricao: 'Sincroniza usuários do AD com o sistema de tickets',
        gatilho: 'Agenda: A cada hora',
        acao: 'Sincronizar usuários',
        ativa: true,
        execucoes: 'Última execução: 21/05/2026 14:00'
      }
    ];

    function renderizarAutomacoes() {
      const container = document.getElementById('automacoesList');
      container.innerHTML = automacoes.map(a => `
        <div class="automacao-card">
          <div class="automacao-header">
            <div class="automacao-titulo">${a.titulo}</div>
            <label class="toggle-switch">
              <input type="checkbox" ${a.ativa ? 'checked' : ''} onchange="toggleAutomacao(${a.id})">
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="automacao-descricao">${a.descricao}</div>

          <span class="status-${a.ativa ? 'ativa' : 'inativa'}">
            ${a.ativa ? '✓ Ativa' : '✗ Inativa'}
          </span>

          <div class="automacao-info">
            <div class="automacao-info-item">
              <span class="automacao-info-label">Gatilho:</span>
              <span>${a.gatilho}</span>
            </div>
            <div class="automacao-info-item">
              <span class="automacao-info-label">Ação:</span>
              <span>${a.acao}</span>
            </div>
            <div class="automacao-info-item">
              <span class="automacao-info-label">Status:</span>
              <span>${a.execucoes}</span>
            </div>
          </div>

          <div class="automacao-acoes">
            <button class="btn-acao" onclick="editarAutomacao(${a.id})">Editar</button>
            <button class="btn-acao" onclick="testarAutomacao(${a.id})">Testar</button>
            <button class="btn-acao" onclick="logs(${a.id})">Logs</button>
          </div>
        </div>
      `).join('');
    }

    function criarNovaAutomacao() {
      alert('Abrir formulário para criar nova automação');
    }

    function toggleAutomacao(id) {
      alert('Automação ' + id + ' toggled');
    }

    function editarAutomacao(id) {
      alert('Editar automação: ' + id);
    }

    function testarAutomacao(id) {
      alert('Testando automação: ' + id);
    }

    function logs(id) {
      alert('Ver logs da automação: ' + id);
    }

    renderizarAutomacoes();
  </script>
</body>
</html>
