    <div class="main-area">
      <header class="topbar">
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-actions">
          <a href="#" id="btn-perfil" onclick="perfilUsuario(event)" style="cursor:pointer;">Perfil</a>
          <a href="#" id="btn-sair" onclick="sairSistema(event)" style="cursor:pointer;">Sair</a>
        </div>
      </header>

      <section class="content">
        <div class="content-box">
        <iframe id="page-frame" src="pages/dashboard.html" style="width:100%; height:100%; border:none;"></iframe>
        </div>
      </section>
    </div>

  <script>
    const menuLinks = document.querySelectorAll('.menu-link');
  const topbarTitle = document.querySelector('.topbar-title');
  const sidebar = document.querySelector('.sidebar');
  const appShell = document.querySelector('.app-shell');
  const sidebarToggle = document.querySelector('.sidebar-toggle');
  const sectionToggles = document.querySelectorAll('.section-toggle');
  const pageFrame = document.getElementById('page-frame');

  // Mapa de páginas: data-page → arquivo HTML
  const pageMap = {
    'Dashboard':      'pages/dashboard.html',
    'Chamados':       'pages/chamados.html',
    'Atendimentos':   'pages/atendimentos.html',
    'SLA':            'pages/sla.html',
    'Agendamento':    'pages/agendamento.html',
    'Dispositivos':   'pages/dispositivos.html',
    'Alertas':        'pages/alertas.html',
    'Inventário':     'pages/inventario.html',
    'Automação':      'pages/automacao.html',
    'Usuários':       'pages/usuarios.html',
    'Clientes':       'pages/clientes.html',
    'Contratos':      'pages/contratos.html',
    'Relatórios':     'pages/relatorios.html',
    'Configurações':  'pages/configuracoes.html',
  };

  // Navegação pelo menu
  menuLinks.forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();

      const page = link.dataset.page;
      const file = pageMap[page];
      const color = link.dataset.color;

      if (file) {
        pageFrame.src = file;
      }

      // Atualiza título da topbar
      topbarTitle.textContent = page;

      // Atualiza cor da topbar
      if (color) {
        document.documentElement.style.setProperty('--topbar', color);
      }

      // Atualiza link ativo
      menuLinks.forEach(l => l.classList.remove('active'));
      link.classList.add('active');
    });
  });

  // Toggle da sidebar (colapsar/expandir)
  sidebarToggle.addEventListener('click', () => {
    sidebar.classList.toggle('collapsed');
    appShell.classList.toggle('sidebar-collapsed');
  });

  // Toggle de cada seção do menu
  sectionToggles.forEach(btn => {
    btn.addEventListener('click', () => {
      const section = btn.closest('.sidebar-section');
      section.classList.toggle('collapsed');
      const expanded = !section.classList.contains('collapsed');
      btn.setAttribute('aria-expanded', expanded);
    });
  });

  // Funções de Perfil e Sair
  function perfilUsuario(e) {
    e.preventDefault();
    const links = document.querySelectorAll('.menu-link');
    const configLink = Array.from(links).find(l => l.dataset.page === 'Configurações');
    if (configLink) configLink.click();
  }

  function sairSistema(e) {
    e.preventDefault();
    if(confirm('Tem certeza que deseja sair do sistema?')) {
      localStorage.removeItem('usuario_logado');
      window.location.href = 'login.html';
    }
  }
  </script>
