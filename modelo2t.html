<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modelo 2T</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 1280px;
      border: 2px solid #000000;
      border-radius: 4px;
      overflow: hidden;
    }

    /* BARRA DE DASHBOARD */
    .dashboard-bar {
      border-bottom: 2px solid #000000;
      padding: 16px 24px;
    }

    .dashboard-bar h1 {
      text-align: center;
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #000000;
    }

    /* ÁREA DE VISUALIZAÇÃO */
    .content-area {
      min-height: 75vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .content-area p {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: #000000;
      line-height: 2;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- BARRA DE DASHBOARD -->
    <div class="dashboard-bar">
      <h1>Barra de Dashboard</h1>
    </div>

    <!-- VISUALIZAÇÃO DAS INFORMAÇÕES -->
    <div class="content-area">
      <p>
        Visualização<br />
        das<br />
        Informações
      </p>
    </div>

  </div>

</body>
</html>
